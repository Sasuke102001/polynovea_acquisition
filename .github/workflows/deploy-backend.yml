name: Deploy Backend to EC2

on:
  push:
    branches: [master]
    paths:
      - "App/backend/**"
      - "scripts/deploy-backend.sh"

jobs:
  deploy:
    name: SSH → EC2 → pull & restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/polynovea_acquisition

            echo "── Pulling latest code ──"
            git pull origin master

            echo "── Pulling research content (M2, M3, SE) ──"
            if [ -d research_cache/.git ]; then
              cd research_cache && git pull origin main && cd ~/polynovea_acquisition
            else
              git clone https://${{ secrets.RESEARCH_PAT }}@github.com/Sasuke102001/polynovea-research.git research_cache
            fi

            # Extract M2, M3, SE research into separate backend folders
            mkdir -p App/backend/research App/backend/research_m3 App/backend/research_se
            cp -r research_cache/m2/* App/backend/research/ 2>/dev/null || echo "  (M2 research folder not found or empty)"
            cp -r research_cache/m3/* App/backend/research_m3/ 2>/dev/null || echo "  (M3 research folder not found or empty)"
            cp -r research_cache/se/* App/backend/research_se/ 2>/dev/null || echo "  (SE research folder not found or empty)"
            rm -rf research_cache

            echo "── Installing dependencies ──"
            cd App/backend
            pip install -r requirements.txt --quiet --break-system-packages

            echo "── Restarting service ──"
            sudo systemctl restart polynovea
            sleep 5
            sudo systemctl is-active polynovea || (sudo journalctl -u polynovea -n 30 --no-pager && exit 1)
            echo "── Service is active ──"
            sudo systemctl status polynovea --no-pager || true
