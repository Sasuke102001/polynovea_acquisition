name: Deploy Backend to EC2

on:
  push:
    branches: [master]
    paths:
      - "App/backend/**"
      - "scripts/deploy-backend.sh"

jobs:
  deploy:
    name: SSH → EC2 → pull & restart
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/polynovea_acquisition

            echo "── Pulling latest code ──"
            git pull origin master

            echo "── Pulling research content ──"
            if [ -d research/.git ]; then
              cd research && git pull origin main && cd ~/polynovea_acquisition
            else
              git clone https://${{ secrets.RESEARCH_PAT }}@github.com/Sasuke102001/polynovea-research.git research
            fi

            echo "── Installing dependencies ──"
            cd App/backend
            pip install -r requirements.txt --quiet --break-system-packages

            echo "── Restarting service ──"
            sudo systemctl restart polynovea
            sleep 5
            sudo systemctl is-active polynovea || (sudo journalctl -u polynovea -n 30 --no-pager && exit 1)
            echo "── Service is active ──"
            sudo systemctl status polynovea --no-pager || true
